name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ==================== 验证版本 ====================
  verify-version:
    name: Verify version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          # 从 Cargo.toml 提取 version(去掉 v 前缀以防万一)
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          CARGO_VERSION=${CARGO_VERSION#v}  # strip leading v if present
          echo "Cargo.toml version: $CARGO_VERSION"
          echo "version=$CARGO_VERSION" >> $GITHUB_OUTPUT

      # push tag 触发时,校验 tag 必须带 v 前缀
      - name: Verify tag version match (push tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          TAG_VERSION=${TAG_VERSION#v}  # strip v prefix
          CARGO_VERSION=${{ steps.version.outputs.version }}
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Version mismatch!"
            echo "Cargo.toml: $CARGO_VERSION"
            echo "Tag: $TAG_VERSION"
            exit 1
          fi
          # 强制要求 tag 必须有 v 前缀
          if [[ ! "$GITHUB_REF" =~ ^refs/tags/v ]]; then
            echo "ERROR: Tag must have 'v' prefix (e.g., v0.5.0), got: $GITHUB_REF"
            exit 1
          fi
          echo "Version verified: v$CARGO_VERSION"

  # ==================== 构建 Wheels ====================
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.14']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.python-version }}

      - name: Install build tools
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --out dist
        env:
          PYO3_PYTHON: ${{ matrix.python-version }}

      - name: Build source distribution
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
        run: maturin sdist --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/*

  # ==================== 汇总 Artifacts ====================
  collect-artifacts:
    name: Collect artifacts
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ==================== 发布到 TestPyPI ====================
  publish-testpypi:
    name: Publish to TestPyPI
    needs: collect-artifacts
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TESTPYPI_API_TOKEN }}

  # ==================== 发布到 PyPI ====================
  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  # ==================== GitHub Release ====================
  create-release:
    name: Create GitHub Release
    needs: [publish-pypi, verify-version]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'b') || contains(github.ref, 'rc') }}
          # 关键:用 verify-version 输出的 version 显式拼接 v 前缀,
          # 防止 workflow_dispatch 触发时 ref_name 是分支名(如 "0.5.0")
          # 导致创建的 release name / tag 缺失 v 前缀
          tag_name: v${{ needs.verify-version.outputs.version }}
          name: Release v${{ needs.verify-version.outputs.version }}
