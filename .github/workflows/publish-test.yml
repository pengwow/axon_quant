name: Publish to TestPyPI

on:
  push:
    branches: [main, develop]
    paths:
      - 'Cargo.toml'
      - 'pyproject.toml'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ==================== 检查版本变更 ====================
  check-version:
    name: Check version change
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version change
        id: check
        run: |
          # 获取当前和上一个提交的版本号
          CURRENT_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          PREVIOUS_VERSION=$(git show HEAD~1:Cargo.toml 2>/dev/null | grep '^version' | head -1 | sed 's/.*"\(.*\)"/\1/' || echo "")
          
          echo "Current: $CURRENT_VERSION"
          echo "Previous: $PREVIOUS_VERSION"
          
          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ] && [ -n "$PREVIOUS_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "No version change detected"
          fi

  # ==================== 构建 Wheels ====================
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.python-version }}

      - name: Install build tools
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --out dist
        env:
          PYO3_PYTHON: ${{ matrix.python-version }}
        continue-on-error: false

      - name: Build wheel (retry 1)
        if: failure()
        run: maturin build --release --out dist
        env:
          PYO3_PYTHON: ${{ matrix.python-version }}
        continue-on-error: false

      - name: Build wheel (retry 2)
        if: failure()
        run: maturin build --release --out dist
        env:
          PYO3_PYTHON: ${{ matrix.python-version }}

      - name: Build source distribution
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: maturin sdist --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/*

  # ==================== 汇总 Artifacts ====================
  collect-artifacts:
    name: Collect artifacts
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ==================== 发布到 TestPyPI ====================
  publish-testpypi:
    name: Publish to TestPyPI
    needs: collect-artifacts
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TESTPYPI_API_TOKEN }}
          skip-existing: true
