name: Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# 同一分支重复触发时取消前次运行
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================== 基础检查 ====================
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ==================== 测试矩阵 ====================
  test:
    name: Test (${{ matrix.os }}, ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}
      - name: Run unit tests
        # 注：不使用 --all-features，避免触发 axon-rl/hpo/walk-forward/distributed
        # 的 python feature 编译，导致 GitHub runner 上 PyO3 0.23 与 Python 3.14 不兼容。
        run: cargo test --workspace

  # ==================== 编译验证 ====================
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-build
      - name: Build (default features)
        run: cargo build --workspace
      - name: Build (no default features)
        run: cargo build --workspace --no-default-features

  # ==================== MSRV 检查 ====================
  msrv:
    name: MSRV Check (1.96.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
      - uses: Swatinem/rust-cache@v2
      - name: Check MSRV compatibility
        # 注：不使用 --all-features，避免触发 axon-rl/hpo/walk-forward/distributed
        # 的 python feature 编译，导致 GitHub runner 上 PyO3 0.23 与 Python 3.14 不兼容。
        run: cargo check --workspace

  # ==================== 文档构建 ====================
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build documentation
        # 注：不使用 --all-features，避免触发 axon-rl/hpo/walk-forward/distributed
        # 的 python feature，进而避免 GitHub runner 上 PyO3 0.23 与 Python 3.14 不兼容的编译错误。
        # 默认 features 已能覆盖 6 个 crate 的 lib 文档。
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

  # ==================== 安全审计 ====================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run security audit
        # Phase 0 阶段不阻断合并，仅警告
        run: cargo audit
        continue-on-error: true

  # ==================== 最终状态汇总 ====================
  success:
    name: CI Success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - fmt
      - clippy
      - test
      - build
      - msrv
      - docs
    steps:
      - name: Check critical jobs
        run: |
          if [[ "${{ needs.fmt.result }}" != "success" ]] ||
             [[ "${{ needs.clippy.result }}" != "success" ]] ||
             [[ "${{ needs.test.result }}" != "success" ]] ||
             [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "Critical jobs failed!"
            exit 1
          fi
          echo "All critical checks passed!"
