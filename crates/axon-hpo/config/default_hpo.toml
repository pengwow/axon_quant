# AXON 超参数优化默认配置
#
# 适用于 PPO 交易策略的 HPO 搜索。
# 通过 `toml` 加载到 `axon_hpo.config.HPOConfig`。

[study]
study_name = "axon_rl_ppo_v1"
direction = "maximize"
storage = "sqlite:///axon_hpo.db"
load_if_exists = true

[study.sampler]
sampler_type = "tpe"
seed = 42
n_startup_trials = 10
n_warmup_steps = 0

[study.pruner]
pruner_type = "median"
n_startup_trials = 5
n_warmup_steps = 10

# ── 搜索空间 ──────────────────────────────────────────────

[search_space.learning_rate]
type = "log_uniform"
low = 1e-5
high = 1e-2

[search_space.gamma]
type = "uniform"
low = 0.95
high = 0.999

[search_space.gae_lambda]
type = "uniform"
low = 0.9
high = 1.0

[search_space.clip_range]
type = "uniform"
low = 0.1
high = 0.4

[search_space.entropy_coef]
type = "log_uniform"
low = 1e-4
high = 0.05

[search_space.value_loss_coef]
type = "uniform"
low = 0.1
high = 1.0

[search_space.batch_size]
type = "choice"
choices = [32, 64, 128, 256, 512]

[search_space.n_epochs]
type = "int_uniform"
low = 3
high = 20
step = 1

[search_space.num_layers]
type = "int_uniform"
low = 1
high = 4
step = 1

[search_space.hidden_size]
type = "choice"
choices = [64, 128, 256, 512]

[search_space.nminibatches]
type = "choice"
choices = [4, 8, 16, 32]

# ── 目标函数 ──────────────────────────────────────────────

[objective]
resource_name = "episode_reward"
timeout_seconds = 600
type = "single"
direction = "maximize"

# ── HPO 运行参数 ──────────────────────────────────────────

[hpo]
n_trials = 100
n_jobs = 4
timeout_seconds = 7200
early_stopping = true
