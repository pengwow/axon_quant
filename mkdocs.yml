# mkdocs 文档站配置
# 部署:GitHub Pages(https://pengwow.github.io/axon_quant/)
# 本地预览:make docs-serve
# 构建:make docs-build

site_name: AXON
site_description: 高性能量化交易与强化学习框架 — Rust 核心 + Python 接口
site_url: https://pengwow.github.io/axon_quant/
repo_url: https://github.com/pengwow/axon_quant
repo_name: pengwow/axon_quant
edit_uri: edit/main/docs/

# 不在 GitHub Pages 仓库根下,使用 project page
docs_dir: docs
site_dir: site

# 主题:Material(业内主流)
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - toc.integrate
  palette:
    # 亮色模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    # 暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  font:
    text: Roboto
    code: Roboto Mono

# 插件
plugins:
  - search:
      lang:
        - en
        - zh
  - git-revision-date-localized:
      enabled: true
      type: date
      strict: false
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
  - autolinks
  - tags

# Markdown 扩展
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.arithmatex:
      generic: true

