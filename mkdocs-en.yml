# mkdocs English documentation configuration
# Build: mkdocs build -f mkdocs-en.yml

site_name: AXON
site_description: AI-Native Quantitative Trading Framework — Rust Core + Python Interface
site_url: https://pengwow.github.io/axon_quant/en/
repo_url: https://github.com/pengwow/axon_quant
repo_name: pengwow/axon_quant
edit_uri: edit/main/docs/en/

docs_dir: docs/en
site_dir: site/en

# 多语言支持
extra:
  alternate:
    - name: 中文
      link: /axon_quant/zh/
      lang: zh
    - name: English
      link: /axon_quant/en/
      lang: en

# Theme: Material
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - toc.integrate
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  font:
    text: Roboto
    code: Roboto Mono

# Plugins
plugins:
  - search:
      lang:
        - en
  - git-revision-date-localized:
      enabled: true
      type: date
      strict: false
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
  - autolinks
  - tags

# Markdown extensions
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.arithmatex:
      generic: true

# Navigation
nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Use Cases:
      - Strategy Development: user-guide/strategy-development.md
      - LLM Agent Trading: user-guide/llm-trading/oader.md
      - Production Deployment: user-guide/production.md
      - Traditional Strategy: user-guide/traditional-strategy.md
  - User Guide:
      - Architecture Overview: user-guide/architecture.md
      - AI-Native Design: user-guide/ai-native-design.md
      - LLM Trading:
          - Overview: user-guide/llm-trading/overview.md
          - Risk & Safety: user-guide/llm-trading/risk-safety.md
          - Metrics & Alerting: user-guide/llm-trading/metrics-alerting.md
          - Operations: user-guide/llm-trading/operations-runbook.md
  - Reference:
      - API Reference: reference/api-reference.md
      - API Docs: reference/api.md
      - CLI Commands: reference/cli.md
      - Python Bindings: reference/python-bindings.md
      - Configuration: reference/configuration.md
  - Architecture Decisions:
      - Index: adr/index.md
      - 0001 Rust as Core Language: adr/0001-rust-as-core-language.md
      - 0002 Cargo Workspace Layout: adr/0002-cargo-workspace-layout.md
      - 0003 Apache-2.0 License: adr/0003-license-dual-mit-apache.md
  - About:
      - Contributing: about/contributing.md
      - Changelog: about/changelog.md
      - License: about/license.md
      - Testing Plan: about/testing-plan.md
      - PyPI Publishing: about/pypi-publishing.md
      - FAQ: about/faq.md

